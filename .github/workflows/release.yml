name: release

# Builds, signs, notarizes, staples, and publishes a Rocky.app zip whenever a
# version tag (v*) is pushed. Requires the repository secrets listed in
# docs/RELEASING.md; without them the signing step will fail (that's expected
# until you've set up an Apple Developer ID).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (without leading v), e.g. 1.0.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    # Dormant until you set up an Apple Developer ID and enable it: add a repo
    # variable SIGN_RELEASES=true (Settings → Secrets and variables → Actions →
    # Variables) plus the signing secrets in docs/RELEASING.md. Until then the
    # job is skipped, so version tags don't produce failing checks.
    if: ${{ vars.SIGN_RELEASES == 'true' }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN" "$(security list-keychains -d user | tr -d '"')"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"

      - name: Build, sign, notarize, staple
        env:
          DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          [ -z "$VERSION" ] && VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/release.sh "$VERSION"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && TAG="v${{ github.event.inputs.version }}"
          gh release create "$TAG" build/Rocky-*.zip \
            --title "Rocky $TAG" --generate-notes || \
          gh release upload "$TAG" build/Rocky-*.zip --clobber
